autoinstall:
  version: 1

  # --- Locale & Keyboard ---
  locale: de_DE.UTF-8
  keyboard:
    layout: de
    variant: ""

  # --- Network ---
  network:
    version: 2
    ethernets:
      eth0:
        dhcp4: true
        dhcp6: false

  # --- Storage ---
  storage:
    config:
      - type: disk
        id: disk0
        path: /dev/sda
        wipe: superblock
        preserve: false
        grub_device: true
      - type: partition
        id: part-efi
        device: disk0
        size: 512M
        flag: boot
        grub_device: true
        preserve: false
      - type: format
        id: format-efi
        volume: part-efi
        fstype: fat32
        label: EFI
      - type: partition
        id: part-swap
        device: disk0
        size: 4G
        preserve: false
      - type: format
        id: format-swap
        volume: part-swap
        fstype: swap
        label: SWAP
      - type: partition
        id: part-root
        device: disk0
        size: -1
        preserve: false
      - type: format
        id: format-root
        volume: part-root
        fstype: ext4
        label: ROOT
      - type: mount
        id: mount-efi
        device: format-efi
        path: /boot/efi
      - type: mount
        id: mount-swap
        device: format-swap
        path: none
      - type: mount
        id: mount-root
        device: format-root
        path: /

  # --- Identity ---
  identity:
    hostname: UbuntuLaptop
    username: azubi
    realname: "Azubi"
    # Passwort-Hash generieren mit: mkpasswd --method=yescrypt
    password: "$6$XzcAQQzOQ3r5ktQx$Om39t3IwvW8.NMf3vscQ4KuqtZB6XIjbyw1wbLKHnX.4LXySn9lW6hSG0Y3EgAfgqnGWR6TqTN07d6goJzBPJ0"

  # --- Desktop ---
  source:
    id: ubuntu-desktop
    search_drivers: true

  # --- Late Commands (Post-Installation) ---
  late-commands:
    # System aktualisieren
    - curtin in-target --target=/target -- apt-get update -y
    - curtin in-target --target=/target -- apt-get upgrade -y
    - curtin in-target --target=/target -- apt-get autoremove -y

    # Basis & Build-Tools
    - curtin in-target --target=/target -- apt-get install -y build-essential git curl wget net-tools htop vim nano

    # Python
    - curtin in-target --target=/target -- apt-get install -y python3 python3-pip python3-dev python3-venv python3-openssl python3-pil

    # Hardware / I2C
    - curtin in-target --target=/target -- apt-get install -y i2c-tools libgpiod2

    # Multimedia
    - curtin in-target --target=/target -- apt-get install -y vlc

    # LibreOffice
    - curtin in-target --target=/target -- apt-get install -y libreoffice libreoffice-l10n-de libreoffice-help-de

    # Firefox
    - curtin in-target --target=/target -- apt-get install -y firefox

    # Arduino IDE Abhängigkeiten
    - curtin in-target --target=/target -- apt-get install -y openjdk-17-jre

    # Nix Abhängigkeiten
    - curtin in-target --target=/target -- apt-get install -y xz-utils

    # Deutsche Sprachpakete
    - curtin in-target --target=/target -- apt-get install -y language-pack-de

    # sudo & adm Gruppe für azubi
    - curtin in-target --target=/target -- usermod -aG sudo azubi
    - curtin in-target --target=/target -- usermod -aG adm azubi

    # pip auf neuesten Stand bringen
    - curtin in-target --target=/target -- pip3 install --upgrade pip --break-system-packages

    # Adafruit CircuitPython DHT Bibliothek
    - curtin in-target --target=/target -- pip3 install adafruit-circuitpython-dht --break-system-packages

    # VS Code installieren (Snap)
    - curtin in-target --target=/target -- snap install code --classic

    # Arduino IDE installieren (Snap)
    - curtin in-target --target=/target -- snap install arduino --classic

    # Raspberry Pi Imager installieren (Snap)
    - curtin in-target --target=/target -- snap install rpi-imager

    # Apport (Crash-Reporter) deaktivieren
    - curtin in-target --target=/target -- systemctl disable apport

    # Nix Package Manager (Single-User) installieren
    - curtin in-target --target=/target -- bash -c "curl -L https://nixos.org/nix/install | sh -s -- --no-daemon"

    # Nix für azubi-User in Shell-Profil einbinden
    - curtin in-target --target=/target -- bash -c "echo '. /home/azubi/.nix-profile/etc/profile.d/nix.sh' >> /home/azubi/.bashrc"

  # --- Reboot after install ---
  shutdown: reboot