autoinstall:
  version: 1

  # --- Locale & Keyboard ---
  locale: de_DE.UTF-8
  keyboard:
    layout: de
    variant: ""

  # --- Network ---
  network:
    version: 2
    ethernets:
      eth0:
        dhcp4: true
        dhcp6: false

  # --- Identity ---
  identity:
    hostname: UbuntuLaptop
    username: azubi
    realname: "Azubi"
    # Generate password hash with: mkpasswd --method=yescrypt
    password: "$6$XzcAQQzOQ3r5ktQx$Om39t3IwvW8.NMf3vscQ4KuqtZB6XIjbyw1wbLKHnX.4LXySn9lW6hSG0Y3EgAfgqnGWR6TqTN07d6goJzBPJ0"

  # --- Desktop Source ---
  source:
    id: ubuntu-desktop
    search_drivers: true

  # --- Storage ---
  storage:
    layout:
      name: direct
      sizing-policy: all

  # --- Late Commands (Post-Installation) ---
  late-commands:
    # Update and upgrade system
    - curtin in-target --target=/target -- apt-get update -y
    - curtin in-target --target=/target -- apt-get upgrade -y
    - curtin in-target --target=/target -- apt-get autoremove -y

    # Install base tools and build essentials
    - curtin in-target --target=/target -- apt-get install -y build-essential git curl wget net-tools htop vim nano

    # Install Python and related packages
    - curtin in-target --target=/target -- apt-get install -y python3 python3-pip python3-dev python3-venv python3-openssl python3-pil

    # Install hardware and I2C tools
    - curtin in-target --target=/target -- apt-get install -y i2c-tools libgpiod2

    # Install multimedia
    - curtin in-target --target=/target -- apt-get install -y vlc

    # Install LibreOffice with German language support
    - curtin in-target --target=/target -- apt-get install -y libreoffice libreoffice-l10n-de libreoffice-help-de

    # Install Java runtime
    - curtin in-target --target=/target -- apt-get install -y openjdk-17-jre

    # Install Visual Studio Code via Microsoft apt repository
    - curtin in-target --target=/target -- bash -c "curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /etc/apt/keyrings/microsoft.gpg"
    - curtin in-target --target=/target -- bash -c "echo 'deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main' > /etc/apt/sources.list.d/vscode.list"
    - curtin in-target --target=/target -- apt-get update -y
    - curtin in-target --target=/target -- apt-get install -y code

    # Install Arduino IDE via official AppImage
    - curtin in-target --target=/target -- bash -c "curl -fsSL https://downloads.arduino.cc/arduino-ide/arduino-ide_latest_Linux_64bit.AppImage -o /opt/arduino-ide.AppImage"
    - curtin in-target --target=/target -- chmod +x /opt/arduino-ide.AppImage
    - curtin in-target --target=/target -- chown azubi:azubi /opt/arduino-ide.AppImage

    # Create Arduino IDE desktop shortcut using printf
    - curtin in-target --target=/target -- bash -c "printf '[Desktop Entry]\nName=Arduino IDE\nExec=/opt/arduino-ide.AppImage\nIcon=arduino\nType=Application\nCategories=Development;\n' > /usr/share/applications/arduino-ide.desktop"

    # Install Raspberry Pi Imager via official apt repository
    - curtin in-target --target=/target -- bash -c "curl -fsSL https://archive.raspberrypi.com/debian/raspberrypi.gpg.key | gpg --dearmor -o /etc/apt/keyrings/raspberrypi.gpg"
    - curtin in-target --target=/target -- bash -c "echo 'deb [signed-by=/etc/apt/keyrings/raspberrypi.gpg] https://archive.raspberrypi.com/debian/ bookworm main' > /etc/apt/sources.list.d/raspberrypi.list"
    - curtin in-target --target=/target -- apt-get update -y
    - curtin in-target --target=/target -- apt-get install -y rpi-imager

    # Install German language packs
    - curtin in-target --target=/target -- apt-get install -y language-pack-de

    # Install Adafruit CircuitPython DHT library
    - curtin in-target --target=/target -- pip3 install adafruit-circuitpython-dht --break-system-packages

    # Add azubi to sudo and adm groups (password required for sudo)
    - curtin in-target --target=/target -- usermod -aG sudo azubi
    - curtin in-target --target=/target -- usermod -aG adm azubi

    # Disable Apport crash reporter
    - curtin in-target --target=/target -- systemctl disable apport

  # --- Reboot after installation ---
  shutdown: reboot