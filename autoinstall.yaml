#cloud-config
autoinstall:
  version: 1

  # --- Locale & Keyboard ---
  locale: de_DE.UTF-8
  keyboard:
    layout: de
    variant: ""

  # --- Network ---
  network:
    version: 2
    ethernets:
      eth0:
        dhcp4: true
        dhcp6: false

  # --- Hostname ---
  hostname: UbuntuLaptop

  # --- User Accounts ---
  identity:
    hostname: UbuntuLaptop
    username: azubi
    realname: "Azubi"
    # Passwort-Hash generieren mit:
    # mkpasswd --method=yescrypt
    password: "$6$XzcAQQzOQ3r5ktQx$Om39t3IwvW8.NMf3vscQ4KuqtZB6XIjbyw1wbLKHnX.4LXySn9lW6hSG0Y3EgAfgqnGWR6TqTN07d6goJzBPJ0"

  # sudo-Rechte via late-commands setzen
  # (identity unterstützt keine Gruppen direkt)

  # --- SSH ---
  ssh:
    install-server: false
    allow-pw: false

  # --- Storage ---
  storage:
    config:
      - type: disk
        id: disk0
        path: /dev/sda
        wipe: superblock
        preserve: false
        grub_device: true
      - type: partition
        id: part-efi
        device: disk0
        size: 512M
        flag: boot
        grub_device: true
        preserve: false
      - type: format
        id: format-efi
        volume: part-efi
        fstype: fat32
        label: EFI
      - type: partition
        id: part-swap
        device: disk0
        size: 4G
        preserve: false
      - type: format
        id: format-swap
        volume: part-swap
        fstype: swap
        label: SWAP
      - type: partition
        id: part-root
        device: disk0
        size: -1
        preserve: false
      - type: format
        id: format-root
        volume: part-root
        fstype: ext4
        label: ROOT
      - type: mount
        id: mount-efi
        device: format-efi
        path: /boot/efi
      - type: mount
        id: mount-swap
        device: format-swap
        path: none
      - type: mount
        id: mount-root
        device: format-root
        path: /

  # --- APT Packages ---
  packages:
    # Basis & Build-Tools
    - build-essential
    - git
    - curl
    - wget
    - net-tools
    - htop
    - vim
    - nano
    # Python
    - python3
    - python3-pip
    - python3-dev
    - python3-venv
    - python3-openssl
    - python3-pil
    # Hardware / I2C
    - i2c-tools
    - libgpiod2
    # Multimedia
    - vlc
    # LibreOffice
    - libreoffice
    - libreoffice-l10n-de
    - libreoffice-help-de
    # Firefox
    - firefox
    # Arduino IDE Abhängigkeiten
    - openjdk-17-jre
    # Nix Abhängigkeiten
    - xz-utils

  # --- Snaps ---
  snaps:
    - name: code
      channel: stable
      classic: true
    - name: arduino
      channel: stable
      classic: true
    - name: rpi-imager
      channel: stable

  # --- Late Commands (Post-Installation) ---
  late-commands:
    # System aktualisieren
    - curtin in-target --target=/target -- apt-get update -y
    - curtin in-target --target=/target -- apt-get upgrade -y
    - curtin in-target --target=/target -- apt-get autoremove -y

    # sudo-Rechte für azubi setzen (mit Passwortpflicht)
    - curtin in-target --target=/target -- usermod -aG sudo azubi
    - curtin in-target --target=/target -- usermod -aG adm azubi

    # pip auf neuesten Stand bringen
    - curtin in-target --target=/target -- pip3 install --upgrade pip

    # Adafruit CircuitPython DHT Bibliothek installieren (systemweit)
    - curtin in-target --target=/target -- pip3 install adafruit-circuitpython-dht --break-system-packages

    # Apport (Crash-Reporter) deaktivieren
    - curtin in-target --target=/target -- systemctl disable apport

    # Deutsche Sprachpakete nachinstallieren
    - curtin in-target --target=/target -- apt-get install -y language-pack-de

    # Nix Package Manager (Single-User) installieren
    - curtin in-target --target=/target -- bash -c "curl -L https://nixos.org/nix/install | sh -s -- --no-daemon"

    # Nix für azubi-User in Shell-Profil einbinden
    - curtin in-target --target=/target -- bash -c "echo '. /home/azubi/.nix-profile/etc/profile.d/nix.sh' >> /home/azubi/.bashrc"

  # --- Updates ---
  updates: security

  # --- Reboot after install ---
  shutdown: reboot